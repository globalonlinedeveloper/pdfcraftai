# .github/workflows/prod-e2e.yml
#
# 2026-05-12 — on-demand production E2E suite. Phases:
#
#   1   — Anonymous smoke (53 tests, no DB writes, no credit spend)
#   3a  — Free tool execution (13 tests, no DB writes, no credit spend)
#   2   — Authenticated flows (6 tests, login + dashboard probes)
#   3b  — AI tool execution (12 tests, ~65 credits/run)
#   4   — Payment flows (1 test active, full checkout deferred)
#
# Two cadences:
#
#   Daily 06:00 UTC (11:30 IST) — Phase 1 + 3a only. Always-safe
#     surface (no DB writes, no credit spend, no money moved).
#     Catches overnight regressions before peak Indian traffic.
#
#   Weekly Sunday 06:00 UTC — Phase 1 + 3a + 2 + 3b. Adds the
#     authenticated + AI surfaces. ~65 credits / week ≈ $0.40/mo
#     on the test account. Each AI run writes ai_usage + ledger
#     rows (visible in /admin/margin as test-account spend).
#
#   Manual via `gh workflow run` — operator picks via the `phases`
#     input. Options:
#       smoke    → Phase 1 + 3a (same as daily)
#       full     → Phase 1 + 3a + 2 + 3b (same as weekly)
#       payments → Adds Phase 4 on top of full (requires extra
#                  secrets — see tests/e2e-prod/README.md).
#
# Secrets pulled from GitHub Actions repo secrets:
#   PROD_E2E_TEST_EMAIL          — Phase 2 + 3b + 4
#   PROD_E2E_TEST_PASSWORD       —
#   PROD_E2E_AI_BUDGET_OK        — Phase 3b only ("yes" to enable)
#   PROD_E2E_RAZORPAY_TEST_KEY   — Phase 4 only
#   PROD_E2E_PAYMENTS_OK         — Phase 4 only ("yes" to enable)
#
# If a phase's secret isn't set, that phase's tests SKIP (not fail).
# So this workflow stays green-by-default until the operator
# explicitly enables the next phase.

name: prod-e2e

on:
  workflow_dispatch:
    inputs:
      phases:
        description: "Which phases to run"
        required: false
        default: "smoke"
        type: choice
        options:
          - smoke    # 1 + 3a (safe; daily cadence)
          - full     # + 2 + 3b (authed + AI; weekly cadence)
          - payments # + 4 (Razorpay test-mode checkout)
      url:
        description: "URL to test against"
        required: false
        default: "https://pdfcraftai.com"

  schedule:
    # Daily Mon-Sat at 06:00 UTC — Phase 1 + 3a only (safe).
    # Sunday is omitted to avoid a duplicate run alongside the
    # weekly entry below (GitHub fires each matching cron line
    # separately — if both `0 6 * * *` and `0 6 * * 0` were listed,
    # Sunday at 06:00 would get TWO runs).
    - cron: "0 6 * * 1-6"
    # Weekly Sunday at 06:00 UTC — Phase 1 + 3a + 2 + 3b (authed + AI).
    - cron: "0 6 * * 0"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        # Single-browser install (vs the full triple) keeps the
        # job under 90s of setup. Phase 1 suite is chromium-only.
        run: npx playwright install --with-deps chromium

      - name: Determine phase scope
        id: scope
        run: |
          # workflow_dispatch.inputs.phases wins if present.
          # Else: weekly Sunday cron → "full", daily cron → "smoke".
          if [ -n "${{ github.event.inputs.phases }}" ]; then
            phases="${{ github.event.inputs.phases }}"
          elif [ "${{ github.event.schedule }}" = "0 6 * * 0" ]; then
            phases="full"
          else
            phases="smoke"
          fi
          echo "phases=$phases" >> "$GITHUB_OUTPUT"
          echo "Running phases: $phases"

      - name: Run prod-E2E suite
        env:
          PROD_E2E_URL: ${{ github.event.inputs.url || 'https://pdfcraftai.com' }}
          # Phase 2 + 3b + 4 secrets — only injected when the
          # scope includes them. Empty values make the relevant
          # describe blocks `test.skip` cleanly.
          PROD_E2E_TEST_EMAIL: ${{ (steps.scope.outputs.phases == 'full' || steps.scope.outputs.phases == 'payments') && secrets.PROD_E2E_TEST_EMAIL || '' }}
          PROD_E2E_TEST_PASSWORD: ${{ (steps.scope.outputs.phases == 'full' || steps.scope.outputs.phases == 'payments') && secrets.PROD_E2E_TEST_PASSWORD || '' }}
          PROD_E2E_AI_BUDGET_OK: ${{ (steps.scope.outputs.phases == 'full' || steps.scope.outputs.phases == 'payments') && secrets.PROD_E2E_AI_BUDGET_OK || '' }}
          # Phase 4 secrets — only when scope == 'payments'.
          PROD_E2E_RAZORPAY_TEST_KEY: ${{ steps.scope.outputs.phases == 'payments' && secrets.PROD_E2E_RAZORPAY_TEST_KEY || '' }}
          PROD_E2E_PAYMENTS_OK: ${{ steps.scope.outputs.phases == 'payments' && secrets.PROD_E2E_PAYMENTS_OK || '' }}
        run: npm run test:prod-e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod
          path: playwright-report-prod/
          retention-days: 14

      - name: Open GitHub issue on scheduled-run failure
        # Only fires for failed scheduled runs. Manual runs (via
        # workflow_dispatch) don't need an auto-issue — the
        # developer who triggered the run already sees the result.
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const schedule = "${{ github.event.schedule }}";
            const isWeekly = schedule === "0 6 * * 0";
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `prod-E2E failed on ${isWeekly ? 'weekly' : 'daily'} run ${new Date().toISOString().slice(0, 10)}`,
              body:
                `The ${isWeekly ? 'weekly (Phase 1 + 3a + 2 + 3b)' : 'daily (Phase 1 + 3a)'} prod-E2E suite failed.\n\n` +
                `Run: ${run}\n\n` +
                `Check the Playwright report artifact for the failing assertions.\n` +
                `If this is a known transient (Cloudflare cache miss, etc.), close this issue.\n` +
                `If it's a real regression, the most recent prod deploy is likely the cause — ` +
                `check \`curl https://pdfcraftai.com/api/health | jq .commit\`.`,
              labels: ["prod-e2e-failure", "investigate"],
            });
