# .github/workflows/prod-e2e.yml
#
# 2026-05-12 — on-demand production E2E suite. Triggers:
#
#   - Manual: `gh workflow run prod-e2e.yml` from a maintainer's
#     machine, or via the "Actions" tab in the GitHub UI. Use this
#     before/after a significant deploy.
#
#   - Scheduled: every day at 06:00 UTC (11:30 IST). Catches
#     overnight regressions (deploys to prod don't go through this
#     workflow, so a bad deploy at 23:00 IST gets caught here at
#     11:30 IST — before peak Indian traffic).
#
# What it does:
#   - Checks out the repo at HEAD
#   - Installs Node + Playwright (browsers only — chromium)
#   - Runs `npm run test:prod-e2e` against https://pdfcraftai.com
#   - Uploads the Playwright HTML report as an artifact on failure
#   - Opens a GitHub issue on scheduled-run failure (so the
#     founder sees it without watching the Actions tab)
#
# What it does NOT do:
#   - Deploy code. This is purely an observer.
#   - Mutate anything in production. Suite is read-only (GET only).
#   - Run on every push. The static-parse aggregator (npm test)
#     already gates pushes; this runs on a separate cadence.

name: prod-e2e

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to test against (default: https://pdfcraftai.com)"
        required: false
        default: "https://pdfcraftai.com"

  schedule:
    # Every day at 06:00 UTC = 11:30 IST. Catches overnight
    # regressions before peak Indian traffic.
    - cron: "0 6 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        # Single-browser install (vs the full triple) keeps the
        # job under 90s of setup. Phase 1 suite is chromium-only.
        run: npx playwright install --with-deps chromium

      - name: Run prod-E2E suite
        env:
          PROD_E2E_URL: ${{ github.event.inputs.url || 'https://pdfcraftai.com' }}
        run: npm run test:prod-e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod
          path: playwright-report-prod/
          retention-days: 14

      - name: Open GitHub issue on scheduled-run failure
        # Only fires for failed scheduled runs. Manual runs (via
        # workflow_dispatch) don't need an auto-issue — the
        # developer who triggered the run already sees the result.
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `prod-E2E failed on scheduled run ${new Date().toISOString().slice(0, 10)}`,
              body:
                `The daily prod-E2E suite failed.\n\n` +
                `Run: ${run}\n\n` +
                `Check the Playwright report artifact for the failing assertions.\n` +
                `If this is a known transient (Cloudflare cache miss, etc.), close this issue.\n` +
                `If it's a real regression, the most recent prod deploy is likely the cause — ` +
                `check \`curl https://pdfcraftai.com/api/health | jq .commit\`.`,
              labels: ["prod-e2e-failure", "investigate"],
            });
