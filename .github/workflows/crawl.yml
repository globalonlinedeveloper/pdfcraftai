# Comprehensive public-page crawl of production (Playwright) across 3 engines.
# Manual: gh workflow run crawl.yml -f max=0
name: crawl
on:
  workflow_dispatch:
    inputs:
      max:
        description: "Max URLs to crawl (0 = all)"
        required: false
        default: "0"
      base_url:
        description: "Base URL to crawl"
        required: false
        default: "https://pdfcraftai.com"
jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # WebKit frequently can't launch headless on ubuntu CI runners (browser
    # dies on launch); keep it best-effort so it never reds the workflow while
    # Chromium + Firefox give reliable cross-engine coverage.
    continue-on-error: ${{ matrix.browser == 'webkit' }}
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run crawl (${{ matrix.browser }})
        run: node scripts/crawl-prod.mjs
        env:
          CRAWL_BASE_URL: ${{ inputs.base_url }}
          CRAWL_MAX: ${{ inputs.max }}
          CRAWL_CONCURRENCY: "4"
          CRAWL_BROWSER: ${{ matrix.browser }}
      - name: Upload crawl report (${{ matrix.browser }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-report-${{ matrix.browser }}
          path: crawl-report.json
