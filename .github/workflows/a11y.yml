# Accessibility audit of production (axe-core, WCAG 2.1 A+AA) on a sample of page types.
# Manual: gh workflow run a11y.yml
name: a11y
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to audit"
        required: false
        default: "https://pdfcraftai.com"
jobs:
  a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run a11y audit
        run: node scripts/a11y-prod.mjs
        env:
          A11Y_BASE_URL: ${{ inputs.base_url }}
      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: a11y-report.json
