# .github/workflows/synthetic-monitor.yml
#
# Phase 6 (2026-04-30): synthetic uptime monitor for pdfcraftai.com.
#
# Why this exists:
#   The Hostinger LSAPI 503 cascade (CLAUDE.md §5) recurs on bursty
#   deploys. Local dev has no signal that the site is down — we only
#   find out when a user complains or the next push triggers another
#   cascade. This workflow runs from GitHub Actions infra (independent
#   of Hostinger) every 15 minutes, hits /api/health + 4 representative
#   pages, and posts to Slack on failure.
#
# What's checked every 15 minutes:
#   1. /api/health           → expects 200 + `"ok":true` in body
#   2. /                     → expects 200
#   3. /tools                → expects 200
#   4. /tool/merge           → expects 200 (representative tool runner)
#   5. /admin/deploy         → expects 200/401/307/404 (gated by
#                              requireAdmin(), which 404s anon requests by
#                              design — what we DON'T want is 5xx/000)
#
# Failure mode:
#   - Any non-2xx (or 5xx for /admin/deploy) → workflow fails
#   - Failed runs post to Slack via SLACK_WEBHOOK_URL secret
#   - GitHub Actions auto-retries via the schedule on next 15-min tick,
#     so transient blips don't page; sustained downtime does
#
# Setup needed (user action, one-time):
#   1. Create a Slack incoming webhook for the channel that should
#      receive alerts. Copy the URL.
#   2. In GitHub repo settings → Secrets → Actions → New secret:
#      Name:  SLACK_WEBHOOK_URL
#      Value: https://hooks.slack.com/services/T.../B.../...
#   3. Push this file (already committed). The cron starts firing
#      automatically on the next interval.
#
# Cost: GitHub Actions free tier gives 2000 minutes/month for
# private repos. This workflow runs ~1 minute per invocation × 12
# invocations/hour × 24h × 30d = ~8640 minutes — but the actual run
# time is ~10 seconds, so it's well under the free quota.

name: Synthetic monitor

on:
  schedule:
    # Every 15 minutes (2026-06-03: reduced from */5). GitHub Actions cron
    # is throttled/skipped under platform load and is unreliable for tight-
    # interval uptime monitoring, so */15 cuts run volume + throttling
    # pressure while still catching sustained outages. For fast, reliable
    # liveness use a purpose-built monitor (Cloudflare Worker cron trigger
    # or UptimeRobot) against /api/health — this Actions check is a
    # lightweight stopgap, not a real monitoring system.
    - cron: "*/15 * * * *"
  # Allow manual trigger for ad-hoc checks (e.g., post-deploy verify).
  workflow_dispatch:

# 2026-04-30: skip overlapping runs during prod 503 cascades. Without
# this, every 15min during a 30min cascade fires 2+ identical Slack
# alerts. `cancel-in-progress: false` keeps the in-flight run going
# rather than killing it (we want the most-recent diagnostic, not the
# newest scheduled trigger). The schedule auto-recovers — once the
# in-flight run completes, the next 15-min tick can fire normally.
concurrency:
  group: synthetic-monitor
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 2026-04-30 fix: env at JOB level so the step-level `if:` can
    # actually evaluate `env.SLACK_WEBHOOK_URL`. When env was at the
    # step level, the `if:` ran BEFORE the step's env block applied,
    # so the gate always saw `''` regardless of whether the secret
    # was set. Job-level env is available to `if:` in any contained
    # step.
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Health check + page sanity
        id: smoke
        run: |
          set +e   # don't bail on first failure — collect all signals
          fail=0
          report=""

          check() {
            local label="$1"
            local url="$2"
            local expected="$3"  # regex matching expected codes (e.g. "200" or "200|401")
            local code
            # 2026-04-30 fix: curl outputs `%{http_code}` AND exits non-
            # zero on timeout, so the previous `|| echo "000"` would
            # append a second "000" → got reported as "got 000000".
            # Use `2>/dev/null` and a default fallback only if `code`
            # ends up empty.
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$url" 2>/dev/null)
            code="${code:-000}"
            if echo "$code" | grep -qE "^($expected)$"; then
              report="$report\n  ✓ $label ($code) $url"
            else
              report="$report\n  ✗ $label expected $expected got $code — $url"
              fail=1
            fi
          }

          # /api/health is the gold-standard signal. We additionally
          # verify the body contains `"ok":true` because Hostinger's
          # nginx can return 200 + "Service Unavailable" page during
          # cascade recovery.
          health_body=$(curl -sS --max-time 15 https://pdfcraftai.com/api/health || true)
          if echo "$health_body" | grep -q '"ok":true'; then
            report="$report\n  ✓ /api/health ok=true"
          else
            report="$report\n  ✗ /api/health body did not contain \"ok\":true"
            fail=1
          fi

          check "homepage"          https://pdfcraftai.com/                    "200"
          check "/tools index"      https://pdfcraftai.com/tools               "200"
          check "/tool/merge"       https://pdfcraftai.com/tool/merge          "200"
          # /admin/* is gated by requireAdmin() which calls notFound()
          # (404) for anonymous/non-admin requests BY DESIGN (never 401/307,
          # to avoid disclosing the admin surface — see lib/admin/guard.ts).
          # 404 is therefore the healthy anon response here; only 5xx/000
          # (down) should fail this check.
          check "/admin/deploy"     https://pdfcraftai.com/admin/deploy        "200|401|307|404"

          echo -e "Synthetic monitor results at $(date -u +%FT%TZ):$report"
          if [ "$fail" -ne 0 ]; then
            echo -e "$report" > /tmp/smoke-fail.txt
            echo "fail=1" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "fail=0" >> $GITHUB_OUTPUT

      - name: Post to Slack on failure
        # `env.SLACK_WEBHOOK_URL` here resolves against the JOB-level
        # env block (declared above), which IS available to `if:`.
        # When the secret isn't set, the env value is empty string,
        # this gate skips, and the step is marked "skipped" rather
        # than failing — exactly what we want before the user
        # configures Slack.
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        run: |
          report=$(cat /tmp/smoke-fail.txt 2>/dev/null || echo "(no detail captured)")
          payload=$(cat <<EOF
          {
            "text": ":rotating_light: pdfcraftai.com synthetic monitor failed",
            "blocks": [
              {"type": "header", "text": {"type": "plain_text", "text": "🚨 pdfcraftai.com smoke failed"}},
              {"type": "section", "text": {"type": "mrkdwn", "text": "Run: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|view logs>\nTime: $(date -u +%FT%TZ)"}},
              {"type": "section", "text": {"type": "mrkdwn", "text": "\`\`\`$report\`\`\`"}},
              {"type": "context", "elements": [{"type": "mrkdwn", "text": "Likely fix: hPanel → Resource Usage → Stop running process (per CLAUDE.md §5)"}]}
            ]
          }
          EOF
          )
          curl -sS -X POST -H "Content-Type: application/json" \
            --data "$payload" "$SLACK_WEBHOOK_URL" || true
